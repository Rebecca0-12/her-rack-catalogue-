<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Her Rack — Curated Thrift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /*
    NOTE ON FONT LOADING:
    The Google Fonts <link> above (left untouched, per the "no HTML changes" rule)
    still pulls Fraunces, Space Grotesk and JetBrains Mono. The CSS below no longer
    uses any of them — it defines its own font stacks built from fonts that ship
    with the OS (Georgia/Iowan/Charter-family serif for text, and the system UI
    sans for labels). This avoids a webfont pairing that reads as a template
    default, and it means the page renders correctly even though the link tag
    is fetching fonts we no longer reference.
  */

  :root{
    --ink:#2E2A26;
    --linen:#EDE7DD;
    --sage:#7A8B6F;
    --rust:#C4602E;
    --taupe:#A89684;
    --card-bg:#E3DCCE;

    /* Type stacks: a book-text serif for reading, a plain system sans for
       structural/UI labels. Neither is a "trendy Google Fonts pairing" —
       they're the kind of quiet, load-bearing choices an editorial designer
       reaches for so the type disappears and the content reads. */
    --font-serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: 'Courier New', Courier, monospace;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:var(--linen);
    color:var(--ink);
    font-family:var(--font-sans);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- HEADER ---------- */
  header{
    padding:40px 24px 28px;
    text-align:center;
    position:relative;
    border-bottom:1px solid rgba(46,42,38,0.14);
  }

  .eyebrow{
    font-family:var(--font-sans);
    font-size:11.5px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--rust);
    margin-bottom:10px;
  }

  h1{
    font-family:var(--font-serif);
    font-weight:400;
    font-style:normal;
    font-size:clamp(34px, 8vw, 56px);
    letter-spacing:-0.005em;
    line-height:1.02;
  }

  .tagline{
    margin-top:10px;
    font-size:14.5px;
    color:var(--ink);
    opacity:0.62;
    max-width:360px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.55;
  }

  .ledger-count{
    margin-top:16px;
    font-family:var(--font-mono);
    font-size:11.5px;
    letter-spacing:0.02em;
    color:var(--ink);
    opacity:0.45;
  }

  /* ---------- FILTER BAR ---------- */
  .filter-bar{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:16px 24px;
    scrollbar-width:none;
    border-bottom:1px solid rgba(46,42,38,0.14);
  }
  .filter-bar::-webkit-scrollbar{display:none;}

  .filter-chip{
    flex:0 0 auto;
    font-family:var(--font-sans);
    font-size:12.5px;
    letter-spacing:0.01em;
    padding:7px 14px;
    border:1px solid rgba(46,42,38,0.3);
    border-radius:3px;
    background:transparent;
    color:var(--ink);
    cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    white-space:nowrap;
  }

  .filter-chip:hover{
    border-color:var(--ink);
  }

  .filter-chip.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--linen);
  }

  /* ---------- GRID ---------- */
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1px;
    background:rgba(46,42,38,0.14);
    padding:1px;
  }

  @media(min-width:640px){
    .grid{grid-template-columns:repeat(3,1fr);}
  }

  .lot{
    background:var(--linen);
    display:flex;
    flex-direction:column;
  }

  .lot-image{
    aspect-ratio:3/4;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .lot-number{
    position:absolute;
    top:11px;
    left:11px;
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.02em;
    color:rgba(46,42,38,0.5);
    z-index:2;
  }

  .lot-tag{
    position:absolute;
    top:11px;
    right:11px;
    font-family:var(--font-sans);
    font-size:9.5px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:3px 7px;
    border-radius:2px;
    z-index:2;
  }

  .tag-new{ background:var(--sage); color:var(--linen); }
  .tag-one{ background:var(--rust); color:var(--linen); }

  .lot-mark{
    font-family:var(--font-serif);
    font-style:italic;
    font-weight:400;
    font-size:15px;
    text-align:center;
    padding:0 20px;
    opacity:0.8;
    line-height:1.35;
  }

  .lot-info{
    padding:13px 15px 16px;
    border-top:1px solid rgba(46,42,38,0.1);
  }

  .lot-name{
    font-family:var(--font-serif);
    font-size:15px;
    font-weight:400;
    margin-bottom:3px;
    line-height:1.3;
  }

  .lot-meta{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--ink);
    opacity:0.48;
    letter-spacing:0.01em;
    margin-bottom:10px;
  }

  .lot-bottom{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .lot-price{
    font-family:var(--font-serif);
    font-weight:600;
    font-size:16px;
  }

  .wa-btn{
    display:flex;
    align-items:center;
    gap:6px;
    background:transparent;
    color:var(--ink);
    border:1px solid var(--ink);
    padding:6px 11px;
    border-radius:3px;
    font-family:var(--font-sans);
    font-size:11.5px;
    font-weight:500;
    text-decoration:none;
    cursor:pointer;
    transition:background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    white-space:nowrap;
  }

  .wa-btn:hover{ background:var(--ink); color:var(--linen); }
  .wa-btn:active{ opacity:0.85; }
  .wa-btn svg{ width:11px; height:11px; flex-shrink:0; }

  /* ---------- FOOTER ---------- */
  footer{
    padding:44px 24px 56px;
    text-align:center;
    border-top:1px solid rgba(46,42,38,0.14);
  }

  .footer-mark{
    font-family:var(--font-serif);
    font-style:normal;
    font-weight:400;
    font-size:20px;
    margin-bottom:8px;
  }

  .footer-note{
    font-size:12.5px;
    opacity:0.55;
    max-width:290px;
    margin:0 auto 18px;
    line-height:1.55;
  }

  .footer-cta{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--rust);
    color:var(--linen);
    padding:11px 22px;
    border-radius:3px;
    text-decoration:none;
    font-size:13px;
    font-weight:500;
    transition:background 0.15s ease;
  }

  .footer-cta:hover{ background:#a84f24; }

  :focus-visible{ outline:2px solid var(--rust); outline-offset:3px; }

  @media (prefers-reduced-motion: reduce){
    .wa-btn{ transition:none; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">New arrivals weekly</div>
  <h1>Her Rack</h1>
  <p class="tagline">Quality thrift finds, updated regularly. Shop before they're gone.</p>
  <div class="ledger-count" id="ledgerCount">14 pieces currently in the ledger</div>
</header>

<div class="filter-bar" id="filterBar"></div>

<div class="grid" id="grid"></div>

<footer>
  <div class="footer-mark">Her Rack</div>
  <p class="footer-note">Every lot is single-quantity and first-come. Tap "Claim on WhatsApp" and we'll confirm availability and arrange delivery or pickup.</p>
  <a class="footer-cta" href="https://wa.me/2340000000000?text=Hi%2C%20I%27d%20like%20to%20browse%20what%27s%20currently%20available%20at%20Her%20Rack" target="_blank" rel="noopener">
    Message the shop
  </a>
</footer>

<script>
  // ---- PRODUCT LIST ----
  // Products are loaded at runtime from a published Google Sheets CSV.
  // Sheet columns: name, category, price, tag, meta, image, sold
  // There is no id column in the sheet — id is generated from row order (1-based).
  // Rows whose "sold" column is truthy (TRUE/true/Yes/yes/1) are excluded entirely.
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6L6Lao3JrXNnovef8CnJ8KMnmKjP7hfzEYxT09aFyDtP00a8vyZYf4uUCPhtq7yBFGOgIVSSJfJbf/pub?output=csv";

  const WHATSAPP_NUMBER = "2340000000000"; // shop's WhatsApp number, digits only, country code first

  const grid = document.getElementById('grid');
  const filterBar = document.getElementById('filterBar');
  const ledgerCount = document.getElementById('ledgerCount');

  let PRODUCTS = [];
  let categories = ["All"];
  let activeCategory = "All";

  // ---- Minimal CSV parser (no external libraries) ----
  // Handles quoted fields, commas inside quotes, and escaped quotes ("").
  function parseCSV(text){
    const rows = [];
    let row = [];
    let field = "";
    let inQuotes = false;

    for (let i = 0; i < text.length; i++){
      const char = text[i];
      const next = text[i + 1];

      if (inQuotes){
        if (char === '"' && next === '"'){ field += '"'; i++; }
        else if (char === '"'){ inQuotes = false; }
        else { field += char; }
      } else {
        if (char === '"'){ inQuotes = true; }
        else if (char === ','){ row.push(field); field = ""; }
        else if (char === '\r'){ /* skip, handled by \n */ }
        else if (char === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
        else { field += char; }
      }
    }
    // last field/row (files may or may not end with a newline)
    if (field.length > 0 || row.length > 0){
      row.push(field);
      rows.push(row);
    }

    return rows.filter(r => r.length > 1 || (r.length === 1 && r[0] !== ""));
  }

  function isSold(value){
    const v = (value || "").toString().trim().toLowerCase();
    return v === "true" || v === "yes" || v === "1";
  }

  function rowsToProducts(rows){
    if (rows.length === 0) return [];

    const header = rows[0].map(h => h.trim().toLowerCase());
    const idx = {
      name: header.indexOf('name'),
      category: header.indexOf('category'),
      price: header.indexOf('price'),
      tag: header.indexOf('tag'),
      meta: header.indexOf('meta'),
      image: header.indexOf('image'),
      sold: header.indexOf('sold'),
    };

    const products = [];
    let rowNumber = 0;

    for (let i = 1; i < rows.length; i++){
      const r = rows[i];
      // skip fully blank rows
      if (r.every(cell => (cell || "").trim() === "")) continue;

      rowNumber++;

      const soldValue = idx.sold > -1 ? r[idx.sold] : "";
      if (isSold(soldValue)) continue;

      const priceRaw = idx.price > -1 ? r[idx.price] : "";
      const priceNum = parseFloat((priceRaw || "0").toString().replace(/[^0-9.\-]/g, "")) || 0;

      products.push({
        id: rowNumber,
        name: idx.name > -1 ? (r[idx.name] || "").trim() : "",
        category: idx.category > -1 ? (r[idx.category] || "").trim() : "",
        price: priceNum,
        tag: idx.tag > -1 ? (r[idx.tag] || "").trim() : "",
        meta: idx.meta > -1 ? (r[idx.meta] || "").trim() : "",
        image: idx.image > -1 ? (r[idx.image] || "").trim() : "",
      });
    }

    return products;
  }

  async function loadProducts(){
    try {
      ledgerCount.textContent = "Loading pieces…";
      const res = await fetch(CSV_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`CSV fetch failed: ${res.status}`);
      const text = await res.text();

      const rows = parseCSV(text);
      PRODUCTS = rowsToProducts(rows);
      categories = ["All", ...new Set(PRODUCTS.map(p => p.category).filter(Boolean))];

      renderFilters();
      renderGrid();
    } catch (err){
      console.error("Failed to load products:", err);
      ledgerCount.textContent = "Couldn't load pieces right now.";
      filterBar.innerHTML = "";
      grid.innerHTML = "";
    }
  }

  function formatPrice(n){
    return "₦" + n.toLocaleString('en-NG');
  }

  function waLink(product){
    const msg = `Hi! I'd like to claim Lot ${String(product.id).padStart(2,'0')} — ${product.name} (${formatPrice(product.price)}). Is it still available?`;
    return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  }

  function renderFilters(){
    filterBar.innerHTML = categories.map(cat =>
      `<button class="filter-chip ${cat === activeCategory ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
    ).join('');

    filterBar.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        renderFilters();
        renderGrid();
      });
    });
  }

  function renderGrid(){
    const filtered = activeCategory === "All"
      ? PRODUCTS
      : PRODUCTS.filter(p => p.category === activeCategory);

    ledgerCount.textContent = `${filtered.length} piece${filtered.length !== 1 ? 's' : ''} currently in the ledger`;

    grid.innerHTML = filtered.map((p, i) => `
      <div class="lot" style="animation-delay:${i * 0.03}s">
        <div class="lot-image" style="background:${placeholderTone(p.id)}">
          <span class="lot-number">LOT ${String(p.id).padStart(2,'0')}</span>
          ${p.tag === 'new' ? '<span class="lot-tag tag-new">New in</span>' : ''}
          ${p.tag === 'one' ? '<span class="lot-tag tag-one">Only one</span>' : ''}
          ${p.image
            ? `<img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">`
            : `<span class="lot-mark">${p.name}</span>`
          }
        </div>
        <div class="lot-info">
          <div class="lot-name">${p.name}</div>
          <div class="lot-meta">${p.meta}</div>
          <div class="lot-bottom">
            <span class="lot-price">${formatPrice(p.price)}</span>
            <a class="wa-btn" href="${waLink(p)}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.39 1.26 4.81L2 22l5.42-1.42a9.87 9.87 0 004.62 1.18h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.45 17.5 2 12.04 2zm5.87 14.02c-.25.7-1.24 1.29-2.03 1.46-.54.11-1.24.2-3.6-.77-2.99-1.24-4.92-4.27-5.07-4.47-.15-.2-1.22-1.62-1.22-3.1 0-1.48.77-2.2 1.05-2.5.28-.3.6-.37.8-.37.2 0 .4 0 .57.01.18.01.43-.07.67.51.25.6.85 2.08.92 2.23.07.15.12.32.02.52-.1.2-.15.32-.3.5-.15.17-.31.38-.44.51-.15.15-.3.31-.13.6.17.3.76 1.25 1.63 2.02 1.12.99 2.06 1.3 2.36 1.45.3.15.47.12.65-.08.17-.2.74-.86.94-1.16.2-.3.4-.25.67-.15.28.1 1.76.83 2.06.98.3.15.5.22.57.35.08.13.08.72-.17 1.42z"/></svg>
              Claim
            </a>
          </div>
        </div>
      </div>
    `).join('');
  }

  // Deterministic muted tone per item so placeholders feel like one set, not random
  function placeholderTone(id){
    const tones = ['#E3DCCE', '#DCD3C2', '#E8DED0', '#D9CFC0', '#EAE1D3'];
    return tones[id % tones.length];
  }

  loadProducts();
</script>

</body>
</html>
